backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME  # Change this to your repo
  auth_endpoint: /api/auth  # Required for GitHub OAuth

media_folder: docs/assets
public_folder: /assets

collections:
  - name: docs
    label: Documents
    folder: docs
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string, required: true }
      - { label: Tags, name: tags, widget: list, field: { label: Tag, name: tag, widget: string }, default: [] }
      - { label: Status, name: status, widget: select, options: [draft, review, final], default: draft }
      - { label: Last Updated, name: last-updated, widget: datetime, format: YYYY-MM-DD, picker_utc: false }
      - { label: Body, name: body, widget: markdown }
    filter:
      field: title
      pattern: .+

  - name: decisions
    label: Decisions
    folder: docs/decisions
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string, required: true }
      - { label: Tags, name: tags, widget: list, field: { label: Tag, name: tag, widget: string }, default: [] }
      - { label: Status, name: status, widget: select, options: [draft, review, final], default: draft }
      - { label: Last Updated, name: last-updated, widget: datetime, format: YYYY-MM-DD, picker_utc: false }
      - { label: Body, name: body, widget: markdown }
    filter:
      field: title
      pattern: .+
