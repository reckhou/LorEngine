name: Build and Deploy Wiki
# re-register workflow on private mirror

on:
  push:
    paths: ['pages/**', 'wiki/**', 'build_wiki.py', 'config.yml', 'decap.yml', 'content_hashes.json']
    tags: ['v*']
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build wiki
        run: python build_wiki.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit auto-updated timestamps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pages/ content_hashes.json
          git diff --staged --quiet || (git commit -m "chore: auto-update last-updated timestamps [skip ci]" && git pull --rebase origin master && git push)
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
