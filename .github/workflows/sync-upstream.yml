name: Sync Upstream

on:
  schedule:
    - cron: '0 9 * * 1'   # every Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    # Skip in the upstream repo itself — this workflow is only meaningful in forks
    if: github.repository != 'reckhou/lorengine'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          # Points to the official Lorengine upstream by default.
          # Only change this if you maintain your own engine fork and want to
          # track that instead. Your three options as a wiki owner:
          #   1. Leave as-is — track the latest Lorengine engine automatically
          #   2. Delete this workflow — stay on whatever version you forked at
          #   3. Change the repo below — track your own engine fork
          upstream_sync_repo: reckhou/lorengine
          upstream_sync_branch: main
          target_sync_branch: upstream-sync
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          test_mode: false
