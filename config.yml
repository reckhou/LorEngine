# config.yml — edit this in your fork, not in upstream

github:
  repo: "YOUR_USERNAME/YOUR_REPO"

# Folder scanned for wiki pages (relative to repo root). Defaults to "pages".
# Set to "docs" if you prefer the old layout.
pages_dir: "pages"

wiki:
  title: "My Wiki"
  description: "A LorEngine-powered wiki"
  accent_color: "#00D9FF"

ai:
  model: "claude-sonnet-4-6"
  max_tokens: 1024
  enable_prompt_caching: true

search:
  max_results: 10
  excerpt_length: 500

github_pages:
  # Leave base_url empty — this is correct for almost all setups, including
  # GitHub Pages project sites (e.g. username.github.io/repo-name/).
  # Only set this if you are redirecting from a custom domain to a subdirectory
  # path (e.g. base_url: "/my-wiki"). Do NOT set it to your repo name.
  base_url: ""

branding:
  favicon: ""
  logo: ""
