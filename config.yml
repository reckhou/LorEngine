# config.yml — edit this in your fork, not in upstream

github:
  repo: "ProjectAii/TestWiki"

# Folder scanned for wiki pages (relative to repo root). Defaults to "pages".
# Set to "docs" if you prefer the old layout.
pages_dir: "pages"

wiki:
  title: "Test Wiki"
  description: "Test Game."
  accent_color: "#00D9FF"

ai:
  model: "claude-haiku-4-5"
  max_tokens: 1024
  enable_prompt_caching: true

search:
  max_results: 10
  excerpt_length: 500

github_pages:
  base_url: ""

branding:
  favicon: ""
  logo: "https://avatars.githubusercontent.com/u/272316653?s=400&u=fd10caed1236aeccdd4d398a5650594e29d32494&v=4"
