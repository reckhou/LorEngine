<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... — {{WIKI_TITLE}}</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css" media="(prefers-color-scheme: light)">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css" media="(prefers-color-scheme: dark)">
  <style>:root { --accent: {{ACCENT_COLOR}}; }</style>
  <script>
    // Apply stored theme/accent synchronously before first paint to prevent flash.
    (function () {
      var a = localStorage.getItem("LorEngine-accent");
      if (a) document.documentElement.style.setProperty("--accent", a);
      var m = localStorage.getItem("LorEngine-theme");
      if (m) document.documentElement.setAttribute("data-theme", m);
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <div>
      <h1><a href="index.html">{{WIKI_TITLE}}</a></h1>
      <p class="description">{{WIKI_DESCRIPTION}}</p>
    </div>
    <nav class="header-nav">
      <a href="index.html">Home</a>
      <a href="search.html">Search</a>
      <a href="admin/" id="new-page-btn" class="btn-admin" hidden><svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true" style="vertical-align:-1px;margin-right:3px"><path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/></svg>New Page</a>
      <a href="#" id="edit-page-btn" class="btn-admin" hidden><svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true" style="vertical-align:-1px;margin-right:3px"><path d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207zm-7.468 7.468A.5.5 0 0 1 6 13.5V13h-.5a.5.5 0 0 1-.5-.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.5-.5V10h-.5a.499.499 0 0 1-.175-.032l-.179.178a.5.5 0 0 0-.11.168l-2 5a.5.5 0 0 0 .65.65l5-2a.5.5 0 0 0 .168-.11z"/></svg>Edit Page</a>
      <button class="theme-toggle" aria-label="Toggle theme">Theme</button>
    </nav>
  </header>

  <div class="page-layout">
    <aside class="tree-sidebar-wrap">
      <button class="tree-toggle-btn" aria-label="Toggle page tree">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
          <path fill="currentColor" d="M0 2.5A.5.5 0 0 1 .5 2H4a.5.5 0 0 1 .416.223L5 3h4.5a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-.5.5H.5a.5.5 0 0 1-.5-.5v-3z"/>
          <line x1="1.5" y1="6" x2="1.5" y2="14" stroke="currentColor" stroke-width="1.2"/>
          <line x1="1.5" y1="9" x2="3.5" y2="9" stroke="currentColor" stroke-width="1.2"/>
          <line x1="1.5" y1="13" x2="3.5" y2="13" stroke="currentColor" stroke-width="1.2"/>
          <rect fill="currentColor" x="3.5" y="7.5" width="8" height="3" rx="0.5"/>
          <rect fill="currentColor" x="3.5" y="11.5" width="8" height="3" rx="0.5"/>
        </svg>
      </button>
      <div id="tree-sidebar" class="tree-sidebar visible"></div>
    </aside>
    <main class="page-content">
      <div id="page-title-wrapper" class="page-title-wrapper" hidden></div>
      <div id="page-meta" hidden></div>
      <article id="page-body" class="markdown-body">
        <p class="loading">Loading document...</p>
      </article>
      <div id="page-backlinks"></div>
    </main>

    <aside class="toc-sidebar-wrap">
      <button class="toc-toggle-btn" aria-label="Toggle table of contents"></button>
      <div id="toc-sidebar" class="toc-sidebar visible">
        <div id="page-toc"></div>
      </div>
    </aside>
  </div>

  <!-- Floating AI button -->
  <button id="ai-float-btn" class="ai-float-btn" aria-label="Open AI Assistant">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <!-- Quill body angled at ~45° -->
      <path d="M20 4 C16 2 8 10 5 19" fill="none"/>
      <path d="M20 4 C18 8 12 12 5 19" fill="none"/>
      <!-- Nib tip -->
      <path d="M5 19 l1.5-4 2.5 1.5 z" fill="currentColor" stroke="none"/>
      <!-- Sparkle at top of quill -->
      <path d="M19 2 l0.5 1.5 1.5 0.5 -1.5 0.5 -0.5 1.5 -0.5-1.5 -1.5-0.5 1.5-0.5 z" fill="currentColor" stroke="none"/>
    </svg>
  </button>

  <!-- AI Modal -->
  <div id="ai-modal-overlay" class="ai-modal-overlay"></div>
  <div id="ai-modal" class="ai-modal">
    <div class="ai-modal-header">
      <h2>AI Assistant</h2>
      <button class="ai-modal-close" aria-label="Close AI Assistant">&times;</button>
    </div>
    <div class="ai-modal-body">
      <div id="ai-locked-overlay" class="ai-locked-overlay">
        <div class="ai-locked-content">
          <p>API key required to use AI Assistant</p>
          <button id="ai-set-key-btn" class="ai-set-key-btn">Set API Key</button>
        </div>
      </div>
      <div class="ai-messages"></div>
      <div class="ai-input-wrap">
        <textarea class="ai-input" rows="2" placeholder="Ask about this document..."></textarea>
        <button class="ai-send-btn">Send</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/lunr@2/lunr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="wiki.js"></script>
  <script>
    (async function () {
      const params = new URLSearchParams(window.location.search);
      const docId = params.get("doc");

      if (!docId) {
        document.getElementById("page-body").textContent = "No document specified. Return to the index.";
        return;
      }

      try {
        // Load search index and doc content in parallel
        const [searchIndex, mdResp] = await Promise.all([
          loadSearchIndex(),
          fetch(docId),
        ]);

        if (!mdResp.ok) throw new Error(`Document not found: ${docId}`);
        const mdText = await mdResp.text();

        // Find this doc's metadata from the index
        const meta = searchIndex.find((d) => d.id === docId);

        // Update page title
        if (meta) {
          document.title = `${meta.title} — ${WIKI_CONFIG.title}`;
        }

        // Show admin buttons
        const newBtn = document.getElementById('new-page-btn');
        if (newBtn) { newBtn.removeAttribute('hidden'); newBtn.href = adminNewUrl(); }
        const editBtn = document.getElementById('edit-page-btn');
        if (editBtn && meta && meta.id) {
          editBtn.href = adminEditUrl(meta.id);
          editBtn.removeAttribute('hidden');
        }

        // Render page title at top
        const titleWrapperEl = document.getElementById("page-title-wrapper");
        if (meta) {
          titleWrapperEl.removeAttribute("hidden");
          const titleHtml = `<h1 class="page-title">${escapeHtml(meta.title)}</h1>`;
          safeSetInnerHTML(titleWrapperEl, titleHtml);
        }

        // Render metadata bar
        if (meta) {
          const metaEl = document.getElementById("page-meta");
          metaEl.removeAttribute("hidden");
          const metaHtml = `
            <div class="doc-card-meta" style="margin-bottom: var(--space-lg);">
              ${makeBadge(meta.status)}
              ${makeTags(meta.tags)}
              ${meta.last_updated ? `<span>Updated: ${escapeHtml(meta.last_updated)}</span>` : ""}
            </div>`;
          safeSetInnerHTML(metaEl, metaHtml);
        }

        // Strip frontmatter for rendering
        let body = mdText;
        if (body.startsWith("---")) {
          const end = body.indexOf("---", 3);
          if (end !== -1) body = body.slice(end + 3).trim();
        }

        // Build and render table of contents
        const headings = buildToc(body);
        const tocEl = document.getElementById("page-toc");
        safeSetInnerHTML(tocEl, renderToc(headings));

        // Render markdown
        const bodyEl = document.getElementById("page-body");
        safeSetInnerHTML(bodyEl, renderMarkdown(body, docId));

        // Render backlinks if they exist
        if (meta && meta.backlinks && meta.backlinks.length > 0) {
          const backlinksEl = document.getElementById("page-backlinks");
          safeSetInnerHTML(backlinksEl, renderBacklinks(meta.backlinks, searchIndex));
        }

        // Init tree sidebar, TOC sidebar, and AI modal
        initTreeSidebar(searchIndex, document.getElementById("tree-sidebar"));
        initTOCSidebar();
        initAIModal(body, searchIndex, docId);

        // Sidebars: toggle, MQ, resize, persistence
        initSidebar(document.querySelector(".tree-sidebar-wrap"), "right", "LorEngine-tree-width");
        initSidebar(document.querySelector(".toc-sidebar-wrap"), "left", "LorEngine-toc-width");

        // Scroll to heading anchor now that content is rendered
        if (window.location.hash) {
          const target = document.getElementById(window.location.hash.slice(1));
          if (target) target.scrollIntoView();
        }

      } catch (err) {
        document.getElementById("page-body").textContent = "Error loading document: " + err.message;
      }

      initThemePanel();
      initStickyHeader();
    })();
  </script>
</body>
</html>
