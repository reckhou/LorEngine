<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... — {{WIKI_TITLE}}</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css" media="(prefers-color-scheme: light)">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css" media="(prefers-color-scheme: dark)">
  <style>:root { --accent: {{ACCENT_COLOR}}; }</style>
</head>
<body>
  <header class="site-header">
    <div>
      <h1><a href="index.html">{{WIKI_TITLE}}</a></h1>
      <p class="description">{{WIKI_DESCRIPTION}}</p>
    </div>
    <nav class="header-nav">
      <a href="index.html">Home</a>
      <a href="search.html">Search</a>
      <button class="theme-toggle" aria-label="Toggle theme">Theme</button>
    </nav>
  </header>

  <div class="page-layout">
    <aside class="tree-sidebar-wrap">
      <button class="tree-toggle-btn" aria-label="Toggle page tree"></button>
      <div id="tree-sidebar" class="tree-sidebar visible"></div>
    </aside>
    <main class="page-content">
      <div id="page-title-wrapper" class="page-title-wrapper"></div>
      <div id="page-meta"></div>
      <article id="page-body" class="markdown-body">
        <p class="loading">Loading document...</p>
      </article>
      <div id="page-backlinks"></div>
    </main>

    <aside class="toc-sidebar-wrap">
      <button class="toc-toggle-btn" aria-label="Toggle table of contents"></button>
      <div id="toc-sidebar" class="toc-sidebar visible">
        <div id="page-toc"></div>
      </div>
    </aside>
  </div>

  <!-- Floating AI button -->
  <button id="ai-float-btn" class="ai-float-btn" aria-label="Open AI Assistant">AI</button>

  <!-- AI Modal -->
  <div id="ai-modal-overlay" class="ai-modal-overlay"></div>
  <div id="ai-modal" class="ai-modal">
    <div class="ai-modal-header">
      <h2>AI Assistant</h2>
      <button class="ai-modal-close" aria-label="Close AI Assistant">&times;</button>
    </div>
    <div class="ai-modal-body">
      <div id="ai-locked-overlay" class="ai-locked-overlay">
        <div class="ai-locked-content">
          <p>API key required to use AI Assistant</p>
          <button id="ai-set-key-btn" class="ai-set-key-btn">Set API Key</button>
        </div>
      </div>
      <div class="ai-messages"></div>
      <div class="ai-input-wrap">
        <textarea class="ai-input" rows="2" placeholder="Ask about this document..."></textarea>
        <button class="ai-send-btn">Send</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/lunr@2/lunr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="wiki.js"></script>
  <script>
    (async function () {
      const params = new URLSearchParams(window.location.search);
      const docId = params.get("doc");

      if (!docId) {
        document.getElementById("page-body").textContent = "No document specified. Return to the index.";
        return;
      }

      try {
        // Load search index and doc content in parallel
        const [searchIndex, mdResp] = await Promise.all([
          loadSearchIndex(),
          fetch(docId),
        ]);

        if (!mdResp.ok) throw new Error(`Document not found: ${docId}`);
        const mdText = await mdResp.text();

        // Find this doc's metadata from the index
        const meta = searchIndex.find((d) => d.id === docId);

        // Update page title
        if (meta) {
          document.title = `${meta.title} — ${WIKI_CONFIG.title}`;
        }

        // Render page title at top
        const titleWrapperEl = document.getElementById("page-title-wrapper");
        if (meta) {
          const titleHtml = `<h1 class="page-title">${escapeHtml(meta.title)}</h1>`;
          safeSetInnerHTML(titleWrapperEl, titleHtml);
        }

        // Render metadata bar
        if (meta) {
          const metaEl = document.getElementById("page-meta");
          const metaHtml = `
            <div class="doc-card-meta" style="margin-bottom: var(--space-lg);">
              ${makeBadge(meta.status)}
              ${makeTags(meta.tags)}
              ${meta.last_updated ? `<span>Updated: ${escapeHtml(meta.last_updated)}</span>` : ""}
            </div>`;
          safeSetInnerHTML(metaEl, metaHtml);
        }

        // Strip frontmatter for rendering
        let body = mdText;
        if (body.startsWith("---")) {
          const end = body.indexOf("---", 3);
          if (end !== -1) body = body.slice(end + 3).trim();
        }

        // Build and render table of contents
        const headings = buildToc(body);
        const tocEl = document.getElementById("page-toc");
        safeSetInnerHTML(tocEl, renderToc(headings));

        // Render markdown
        const bodyEl = document.getElementById("page-body");
        safeSetInnerHTML(bodyEl, renderMarkdown(body));

        // Render backlinks if they exist
        if (meta && meta.backlinks && meta.backlinks.length > 0) {
          const backlinksEl = document.getElementById("page-backlinks");
          safeSetInnerHTML(backlinksEl, renderBacklinks(meta.backlinks, searchIndex));
        }

        // Init tree sidebar and TOC sidebar
        initTreeSidebar(searchIndex, document.getElementById("tree-sidebar"));
        initTOCSidebar();

        // Scroll to heading anchor now that content is rendered
        if (window.location.hash) {
          const target = document.getElementById(window.location.hash.slice(1));
          if (target) target.scrollIntoView();
        }

      } catch (err) {
        document.getElementById("page-body").textContent = "Error loading document: " + err.message;
      }

      initThemePanel();

      // Tree sidebar toggle
      const toggleBtn = document.querySelector(".tree-toggle-btn");
      const treeSidebar = document.querySelector(".tree-sidebar");
      const treeWrap = document.querySelector(".tree-sidebar-wrap");
      if (toggleBtn) {
        toggleBtn.addEventListener("click", () => {
          treeSidebar.classList.toggle("visible");
          treeWrap.classList.toggle("collapsed");
        });
      }

      // TOC sidebar toggle
      const tocToggleBtn = document.querySelector(".toc-toggle-btn");
      const tocSidebar = document.querySelector(".toc-sidebar");
      const tocWrap = document.querySelector(".toc-sidebar-wrap");
      if (tocToggleBtn) {
        tocToggleBtn.addEventListener("click", () => {
          tocSidebar.classList.toggle("visible");
          tocWrap.classList.toggle("collapsed");
        });
      }

      // AI modal initialization
      initAIModal(body, searchIndex);
    })();
  </script>
</body>
</html>
