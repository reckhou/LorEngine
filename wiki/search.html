<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — {{WIKI_TITLE}}</title>
  <link rel="stylesheet" href="style.css">
  <style>:root { --accent: {{ACCENT_COLOR}}; }</style>
</head>
<body>
  <header class="site-header">
    <div>
      <h1><a href="index.html">{{WIKI_TITLE}}</a></h1>
      <p class="description">{{WIKI_DESCRIPTION}}</p>
    </div>
    <nav class="header-nav">
      <a href="index.html">Index</a>
      <button class="theme-toggle" aria-label="Toggle theme">Theme</button>
    </nav>
  </header>

  <div class="page-layout">
    <aside class="tree-sidebar-wrap">
      <button class="tree-toggle-mobile" aria-label="Toggle page tree">☰ Pages</button>
      <div id="tree-sidebar" class="tree-sidebar"></div>
    </aside>
    <main class="main-content">
      <div class="search-input-wrap">
        <input type="search" id="search-input" class="search-input"
               placeholder="Search documents..." autofocus
               aria-label="Search documents">
      </div>
      <div id="search-results" class="search-results">
        <p class="empty-state">Type to search across all documents.</p>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/lunr@2/lunr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="wiki.js"></script>
  <script>
    (async function () {
      const data = await loadSearchIndex();
      const idx = buildLunrIndex(data);
      const input = document.getElementById("search-input");
      const results = document.getElementById("search-results");

      // Init tree sidebar
      initTreeSidebar(data, document.getElementById("tree-sidebar"));

      // Pre-fill from query param
      const params = new URLSearchParams(window.location.search);
      if (params.get("q")) {
        input.value = params.get("q");
        renderSearch(input.value, idx, data, results);
      }

      let debounce;
      input.addEventListener("input", () => {
        clearTimeout(debounce);
        debounce = setTimeout(() => {
          renderSearch(input.value, idx, data, results);
        }, 200);
      });

      initThemePanel();

      // Mobile tree toggle
      const toggleBtn = document.querySelector(".tree-toggle-mobile");
      const treeSidebar = document.querySelector(".tree-sidebar");
      if (toggleBtn) {
        toggleBtn.addEventListener("click", () => {
          treeSidebar.classList.toggle("visible");
        });
      }
    })();
  </script>
</body>
</html>
